plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.networklogger'
version = '0.1.0'

android {
  namespace "expo.modules.networklogger"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.github.chuckerteam.chucker:library:4.0.0"
}
